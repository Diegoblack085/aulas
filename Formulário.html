    <h1>Formulario aqui</h1>
   
    <form><!--<form> <input type="text"> é para inserir um  formulario 
        para textos-->
        <label for="campo_nome">Nome:</label><!-- label adiciona uma legenda ao campo de entrada for é para algo por exemplo colocar para o formulario -->
        <input id="campo_nome" type="text"  placeholder="Digite seu nome aqui"><br><br><!--
        id coloca um identificador para o campo de entrada pra poder depois colocar ele em
        um campo -->

        <!--placeholder é a legenda 
        do que formulario é usado para indicar o que deve ser inserido-->
        <form>
            <label for="SobreN">Sobrenome</label>
                  <input id="SobreN"type="text" placeholder="Digite seu sobrenome aqui">
